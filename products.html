<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop All Products — Quantum Medical Supply</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <header id="site-header"></header>

  <main>
    <section class="page-head">
      <div class="container">
        <h1>All products</h1>
        <p>Clinical-grade equipment, diagnostics, and consumables. <span id="results-count"></span></p>
      </div>
    </section>

    <section class="section">
      <div class="container catalog-layout">
        <aside class="catalog-sidebar">
          <div class="filter-block">
            <h3>Search</h3>
            <input id="search-input" type="search" placeholder="Stethoscope, gloves…" />
          </div>
          <div class="filter-block">
            <h3>Category</h3>
            <div id="category-filters"></div>
          </div>
          <div class="filter-block">
            <h3>Price</h3>
            <select id="price-filter">
              <option value="all">Any price</option>
              <option value="0-50">Under $50</option>
              <option value="50-150">$50 – $150</option>
              <option value="150-500">$150 – $500</option>
              <option value="500-99999">$500+</option>
            </select>
          </div>
          <div class="filter-block">
            <h3>Sort by</h3>
            <select id="sort-select">
              <option value="featured">Featured</option>
              <option value="price-asc">Price: low to high</option>
              <option value="price-desc">Price: high to low</option>
              <option value="name">Name A–Z</option>
            </select>
          </div>
          <button id="clear-filters" class="btn btn-ghost btn-block">Clear filters</button>
        </aside>

        <div class="catalog-main">
          <div id="catalog-grid" class="product-grid"></div>
          <div id="catalog-empty" class="empty-state" hidden>
            <h3>No products match your filters</h3>
            <p>Try adjusting your search or clearing filters.</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer id="site-footer"></footer>
  <div id="cart-drawer" class="drawer" aria-hidden="true"></div>
  <div id="toast" class="toast" role="status"></div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/catalog.js"></script>
</body>
</html>
