<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — Quantum Medical Supply</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <header id="site-header"></header>

  <main>
    <section class="page-head">
      <div class="container">
        <h1>Checkout</h1>
        <p>Secure ordering · 256-bit TLS · PCI DSS compliant</p>
      </div>
    </section>

    <section class="section">
      <div class="container checkout-layout">
        <form id="checkout-form" class="checkout-form" novalidate>
          <fieldset>
            <legend>Contact</legend>
            <label>Email <input type="email" name="email" required /></label>
            <label>Phone <input type="tel" name="phone" required /></label>
          </fieldset>

          <fieldset>
            <legend>Shipping address</legend>
            <div class="form-row">
              <label>First name <input name="firstName" required /></label>
              <label>Last name <input name="lastName" required /></label>
            </div>
            <label>Facility / Company (optional) <input name="company" /></label>
            <label>Street address <input name="address" required /></label>
            <div class="form-row">
              <label>City <input name="city" required /></label>
              <label>State <input name="state" required maxlength="2" /></label>
              <label>ZIP <input name="zip" required pattern="\d{5}" /></label>
            </div>
          </fieldset>

          <fieldset>
            <legend>Payment</legend>
            <label>Card number <input name="card" required inputmode="numeric" placeholder="1234 5678 9012 3456" /></label>
            <div class="form-row">
              <label>Expiry <input name="exp" required placeholder="MM/YY" /></label>
              <label>CVV <input name="cvv" required inputmode="numeric" placeholder="123" /></label>
            </div>
          </fieldset>

          <button type="submit" class="btn btn-primary btn-block">Place order</button>
          <p class="fineprint">By placing this order you agree to our Terms of Service and Return Policy. This is a demo checkout — no real charges will be made.</p>
        </form>

        <aside class="checkout-summary" id="checkout-summary"></aside>
      </div>
    </section>
  </main>

  <footer id="site-footer"></footer>
  <div id="cart-drawer" class="drawer" aria-hidden="true"></div>
  <div id="toast" class="toast" role="status"></div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/checkout.js"></script>
</body>
</html>
